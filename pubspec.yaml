name: brainplay
description: "BrainPlay - Educational puzzle games"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  get_storage: ^2.1.1
  dio: ^5.4.0
  audioplayers: ^6.1.0
  confetti: ^0.7.0
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.0
  connectivity_plus: ^6.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
